<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pasapalabra – Fiesta David 18 🎉</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #FFD700;
    --hot: #FF2D78;
    --dark: #0a0a14;
    --card: rgba(255,255,255,0.06);
    --green: #00E676;
    --red: #FF1744;
    --yellow: #FFD600;
    --blue: #2979FF;
    --glow-gold: 0 0 24px #FFD70088;
    --glow-green: 0 0 20px #00E67688;
    --glow-red: 0 0 20px #FF174488;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--dark);
    color: #fff;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Animated BG ── */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 10%, #FF2D7822 0%, transparent 60%),
      radial-gradient(ellipse 60% 80% at 80% 90%, #7B2FFF22 0%, transparent 60%),
      radial-gradient(ellipse 50% 50% at 50% 50%, #FFD70011 0%, transparent 70%);
    animation: bgpulse 8s ease-in-out infinite alternate;
  }
  @keyframes bgpulse {
    from { opacity: 0.7; }
    to   { opacity: 1; }
  }

  .container {
    position: relative; z-index: 1;
    max-width: 1100px; margin: 0 auto; padding: 20px 16px 60px;
  }

  /* ── Header ── */
  header {
    text-align: center; padding: 24px 0 10px;
  }
  header h1 {
    font-family: 'Bebas Neue', cursive;
    font-size: clamp(2.4rem, 7vw, 4.5rem);
    letter-spacing: 4px;
    background: linear-gradient(135deg, var(--gold), var(--hot), #FF8C00);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    text-shadow: none;
    filter: drop-shadow(0 0 20px #FF2D7888);
    line-height: 1;
  }
  header p {
    color: rgba(255,255,255,0.5);
    font-size: 0.95rem;
    margin-top: 6px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* ── Tabs ── */
  .tabs {
    display: flex; justify-content: center; gap: 10px; margin: 22px 0;
  }
  .tab-btn {
    padding: 10px 28px; border: none; border-radius: 50px; cursor: pointer;
    font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 0.95rem;
    background: var(--card); color: rgba(255,255,255,0.6);
    border: 1px solid rgba(255,255,255,0.1);
    transition: all 0.3s;
    backdrop-filter: blur(10px);
  }
  .tab-btn.active {
    background: linear-gradient(135deg, var(--gold), var(--hot));
    color: #fff; border-color: transparent;
    box-shadow: var(--glow-gold);
  }

  /* ── Game Panel ── */
  .panel {
    display: none;
    animation: fadeIn 0.4s ease;
  }
  .panel.active { display: block; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:none; } }

  /* ── Scoreboard bar ── */
  .scoreboard {
    display: flex; justify-content: center; gap: 16px; flex-wrap: wrap;
    margin-bottom: 20px;
  }
  .score-pill {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 20px; border-radius: 50px;
    font-weight: 900; font-size: 1.1rem;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.12);
  }
  .score-pill.green { background: rgba(0,230,118,0.15); color: var(--green); box-shadow: var(--glow-green); }
  .score-pill.red   { background: rgba(255,23,68,0.15);  color: var(--red);   box-shadow: var(--glow-red); }
  .score-pill.yellow{ background: rgba(255,214,0,0.15);  color: var(--yellow);}
  .score-pill .icon { font-size: 1.3rem; }

  /* ── Timer ── */
  .timer-wrap {
    text-align: center; margin-bottom: 16px;
  }
  #timer {
    font-family: 'Bebas Neue', cursive;
    font-size: 4rem; letter-spacing: 4px;
    color: var(--gold);
    text-shadow: var(--glow-gold);
    display: inline-block;
    transition: color 0.4s;
  }
  #timer.urgent { color: var(--red); text-shadow: var(--glow-red); animation: urgentPulse 0.5s infinite alternate; }
  @keyframes urgentPulse { from { transform: scale(1); } to { transform: scale(1.08); } }

  /* ── Rosco ── */
  #rosco {
    position: relative;
    width: min(520px, 90vw); height: min(520px, 90vw);
    margin: 0 auto 24px;
  }
  .letra {
    position: absolute;
    width: clamp(32px, 8vw, 44px); height: clamp(32px, 8vw, 44px);
    border-radius: 50%;
    background: rgba(255,255,255,0.12);
    border: 2px solid rgba(255,255,255,0.2);
    color: #fff; font-weight: 900;
    font-size: clamp(0.65rem, 1.8vw, 0.85rem);
    display: flex; align-items: center; justify-content: center;
    transition: all 0.35s cubic-bezier(.34,1.56,.64,1);
    cursor: default; user-select: none;
    backdrop-filter: blur(4px);
  }
  .letra.activa {
    background: var(--gold);
    color: var(--dark);
    border-color: #fff;
    transform: scale(1.35);
    box-shadow: var(--glow-gold), 0 0 0 4px rgba(255,215,0,0.3);
    animation: activePulse 1.2s ease-in-out infinite;
  }
  @keyframes activePulse {
    0%,100% { box-shadow: var(--glow-gold), 0 0 0 4px rgba(255,215,0,0.3); }
    50%      { box-shadow: 0 0 40px #FFD700cc, 0 0 0 8px rgba(255,215,0,0.15); }
  }
  .letra.acierto {
    background: var(--green); color: var(--dark);
    border-color: #00E676; box-shadow: var(--glow-green);
    transform: scale(1.15);
  }
  .letra.error {
    background: var(--red); color: #fff;
    border-color: #FF1744; box-shadow: var(--glow-red);
    transform: scale(1.05);
  }
  .letra.pasada {
    background: rgba(255,214,0,0.2);
    border-color: var(--yellow);
    color: var(--yellow);
  }

  /* ── Question box ── */
  .question-box {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    backdrop-filter: blur(16px);
    border-radius: 20px;
    padding: 22px 28px;
    margin-bottom: 14px;
    min-height: 90px;
    position: relative;
    overflow: hidden;
  }
  .question-box::before {
    content: '';
    position: absolute; top: 0; left: 0;
    width: 5px; height: 100%;
    background: linear-gradient(180deg, var(--gold), var(--hot));
  }
  .letter-badge {
    display: inline-block;
    font-family: 'Bebas Neue', cursive;
    font-size: 1.6rem;
    color: var(--gold);
    margin-right: 10px;
    letter-spacing: 1px;
  }
  #pregunta {
    font-size: clamp(1rem, 2.5vw, 1.25rem);
    line-height: 1.5;
    color: rgba(255,255,255,0.9);
  }
  .tipo-badge {
    display: inline-block;
    padding: 2px 10px; border-radius: 50px;
    font-size: 0.72rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: 1px; margin-right: 8px;
    background: rgba(255,45,120,0.25); color: var(--hot);
    border: 1px solid rgba(255,45,120,0.4);
  }

  /* ── Answer reveal ── */
  #respuestaPantalla {
    background: rgba(255,214,0,0.1);
    border: 1px solid rgba(255,214,0,0.3);
    border-radius: 14px;
    padding: 14px 22px;
    font-size: 1.2rem; font-weight: 700;
    color: var(--gold);
    min-height: 54px;
    margin-bottom: 16px;
    display: flex; align-items: center; gap: 10px;
    transition: all 0.4s;
  }
  #respuestaPantalla:empty { opacity: 0; }
  #respuestaPantalla:not(:empty) { opacity: 1; }

  /* ── Action buttons ── */
  .action-btns {
    display: flex; justify-content: center; gap: 12px; flex-wrap: wrap;
    margin-bottom: 18px;
  }
  .btn {
    padding: 14px 26px; border: none; border-radius: 14px;
    font-family: 'Nunito', sans-serif; font-weight: 900;
    font-size: 1rem; cursor: pointer;
    transition: all 0.2s;
    display: flex; align-items: center; gap: 8px;
    letter-spacing: 0.5px;
  }
  .btn:active { transform: scale(0.95); }
  .btn-green { background: linear-gradient(135deg, #00E676, #00C853); color: #0a1200; box-shadow: 0 6px 24px rgba(0,230,118,0.35); }
  .btn-red   { background: linear-gradient(135deg, #FF1744, #D50000); color: #fff;    box-shadow: 0 6px 24px rgba(255,23,68,0.35); }
  .btn-yellow{ background: linear-gradient(135deg, #FFD600, #FF8F00); color: #1a0a00; box-shadow: 0 6px 24px rgba(255,214,0,0.35); }
  .btn-blue  { background: linear-gradient(135deg, #2979FF, #1565C0); color: #fff;    box-shadow: 0 6px 24px rgba(41,121,255,0.35); }
  .btn-disabled { opacity: 0.4; pointer-events: none; }

  /* ── Start screen ── */
  .start-screen {
    text-align: center; padding: 30px 0 10px;
  }
  .start-screen .big-number {
    font-family: 'Bebas Neue', cursive;
    font-size: 8rem;
    color: var(--gold);
    text-shadow: var(--glow-gold);
    line-height: 1;
    display: none;
  }
  .time-control {
    display: flex; align-items: center; justify-content: center; gap: 14px;
    margin-bottom: 28px;
  }
  .time-control label { font-weight: 700; color: rgba(255,255,255,0.7); font-size: 1rem; }
  .time-control input {
    width: 90px; padding: 10px 14px;
    background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.2);
    border-radius: 10px; color: #fff; font-size: 1.1rem; font-weight: 700;
    text-align: center;
  }

  /* ── Pass queue indicator ── */
  .pass-queue {
    background: rgba(255,214,0,0.08);
    border: 1px solid rgba(255,214,0,0.2);
    border-radius: 14px; padding: 10px 18px;
    margin-bottom: 14px; font-size: 0.9rem;
    color: var(--yellow);
    display: none;
  }
  .pass-queue.visible { display: block; }

  /* ── Modal de fin ── */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 1000;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(10px);
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
    opacity: 0; pointer-events: none;
    transition: opacity 0.4s;
  }
  .modal-overlay.visible { opacity: 1; pointer-events: all; }
  .modal {
    background: linear-gradient(145deg, #0d0d24, #16162e);
    border: 1px solid rgba(255,215,0,0.3);
    border-radius: 28px; padding: 40px 50px;
    text-align: center; max-width: 440px; width: 100%;
    box-shadow: 0 0 80px rgba(255,45,120,0.3), 0 0 40px rgba(255,215,0,0.2);
    transform: scale(0.9);
    transition: transform 0.4s cubic-bezier(.34,1.56,.64,1);
  }
  .modal-overlay.visible .modal { transform: scale(1); }
  .modal h2 {
    font-family: 'Bebas Neue', cursive;
    font-size: 3rem; letter-spacing: 3px;
    background: linear-gradient(135deg, var(--gold), var(--hot));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 28px;
  }
  .modal-scores {
    display: flex; justify-content: center; gap: 20px; flex-wrap: wrap;
    margin-bottom: 32px;
  }
  .modal-score-item {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    padding: 16px 24px; border-radius: 18px;
    backdrop-filter: blur(10px);
  }
  .modal-score-item .num {
    font-family: 'Bebas Neue', cursive; font-size: 3.5rem; line-height: 1;
  }
  .modal-score-item .lbl { font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; opacity: 0.8; }
  .modal-score-item.g { background: rgba(0,230,118,0.15); color: var(--green); }
  .modal-score-item.r { background: rgba(255,23,68,0.15);  color: var(--red); }
  .modal-score-item.y { background: rgba(255,214,0,0.15);  color: var(--yellow); }

  /* ── Config tab ── */
  .config-panel { padding: 10px 0; }
  .config-panel h2 {
    font-family: 'Bebas Neue', cursive;
    font-size: 1.8rem; letter-spacing: 2px; color: var(--gold);
    margin-bottom: 16px;
  }
  .config-row {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px; padding: 12px 16px;
    margin-bottom: 10px;
    display: grid; grid-template-columns: 40px auto; gap: 10px; align-items: start;
  }
  .config-letter {
    font-family: 'Bebas Neue', cursive; font-size: 1.8rem;
    color: var(--gold); line-height: 1; padding-top: 6px;
  }
  .config-fields { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
  .config-fields select, .config-fields input {
    padding: 7px 12px;
    background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
    border-radius: 9px; color: #fff; font-family: 'Nunito', sans-serif;
    font-size: 0.9rem;
  }
  .config-fields input[type="text"] { flex: 1; min-width: 150px; }
  .config-fields input.resp { width: 150px; }
  .btn-sm {
    padding: 7px 14px; border-radius: 9px; border: none;
    font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 0.82rem;
    cursor: pointer; transition: all 0.2s;
  }
  .btn-sm:active { transform: scale(0.95); }
  .btn-save { background: rgba(0,230,118,0.2); color: var(--green); border: 1px solid rgba(0,230,118,0.4); }
  .btn-del  { background: rgba(255,23,68,0.2);  color: var(--red);   border: 1px solid rgba(255,23,68,0.4); }

  /* ── Confeti canvas ── */
  #confeti { position: fixed; inset: 0; pointer-events: none; z-index: 9999; }

  /* ── Countdown overlay ── */
  #countdownOverlay {
    position: fixed; inset: 0; z-index: 500;
    background: rgba(0,0,0,0.8); backdrop-filter: blur(8px);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity 0.3s;
  }
  #countdownOverlay.visible { opacity: 1; pointer-events: all; }
  #countdownNum {
    font-family: 'Bebas Neue', cursive;
    font-size: 15rem; line-height: 1;
    background: linear-gradient(135deg, var(--gold), var(--hot));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    animation: countPop 1s ease-in-out;
  }
  @keyframes countPop {
    0%   { transform: scale(2); opacity: 0; }
    40%  { transform: scale(1); opacity: 1; }
    80%  { transform: scale(1); opacity: 1; }
    100% { transform: scale(0.5); opacity: 0; }
  }
  #countdownLabel {
    font-family: 'Bebas Neue', cursive;
    font-size: 2rem; letter-spacing: 6px; color: rgba(255,255,255,0.6);
    margin-top: -20px;
  }

  /* ── Responsive ── */
  @media (max-width: 540px) {
    .action-btns { gap: 8px; }
    .btn { padding: 12px 16px; font-size: 0.9rem; }
    .modal { padding: 28px 20px; }
  }
</style>
</head>
<body>

<canvas id="confeti"></canvas>

<!-- Countdown Overlay -->
<div id="countdownOverlay">
  <div id="countdownNum">3</div>
  <div id="countdownLabel">PREPARADOS</div>
</div>

<!-- End Modal -->
<div class="modal-overlay" id="modalFin">
  <div class="modal">
    <h2>🎉 ¡FIN DEL JUEGO!</h2>
    <div class="modal-scores">
      <div class="modal-score-item g">
        <span class="num" id="finAciertos">0</span>
        <span class="lbl">✅ Aciertos</span>
      </div>
      <div class="modal-score-item r">
        <span class="num" id="finErrores">0</span>
        <span class="lbl">❌ Errores</span>
      </div>
      <div class="modal-score-item y">
        <span class="num" id="finPasapalabras">0</span>
        <span class="lbl">⏩ Pasadas</span>
      </div>
    </div>
    <p id="finMensaje" style="font-size:1.2rem;margin-bottom:28px;color:rgba(255,255,255,0.8);line-height:1.5;"></p>
    <button class="btn btn-blue" onclick="resetGame()" style="width:100%;justify-content:center;font-size:1.1rem;">
      🔄 Jugar otra vez
    </button>
  </div>
</div>

<div class="container">
  <header>
    <h1>PASAPALABRA</h1>
    <h2>🎂 Fiesta Cumpleaños David 18 🎂</h2>
  </header>

  <div class="tabs">
    <button class="tab-btn active" onclick="abrirTab('juego', this)">🎮 Juego</button>
    <button class="tab-btn" onclick="abrirTab('config', this)">⚙️ Preguntas</button>
  </div>

  <!-- JUEGO -->
  <div id="juego" class="panel active">

    <div class="start-screen" id="startScreen">
      <div class="time-control">
        <label for="tiempo">⏱ Tiempo (segundos):</label>
        <input id="tiempo" type="number" value="180" min="30" max="600">
      </div>
      <button class="btn btn-blue" style="font-size:1.2rem;padding:16px 40px;margin:0 auto;display:block;" onclick="iniciar()">
        🚀 ¡Empezar!
      </button>
    </div>

    <div id="gameScreen" style="display:none;">
      <!-- Scores -->
      <div class="scoreboard">
        <div class="score-pill green"><span class="icon">✅</span> <span id="scoreAciertos">0</span></div>
        <div class="score-pill red">  <span class="icon">❌</span> <span id="scoreErrores">0</span></div>
        <div class="score-pill yellow"><span class="icon">⏩</span> <span id="scorePasas">0</span></div>
      </div>

      <!-- Timer -->
      <div class="timer-wrap">
        <span id="timer">180</span>
      </div>

      <!-- Rosco -->
      <div id="rosco"></div>

      <!-- Pass queue info -->
      <div class="pass-queue" id="passQueueInfo"></div>

      <!-- Question -->
      <div class="question-box">
        <div id="pregunta">Pulsa <b>¡Empezar!</b> para comenzar el rosco.</div>
      </div>

      <!-- Answer reveal -->
      <div id="respuestaPantalla"></div>

      <!-- Buttons -->
      <div class="action-btns">
        <button class="btn btn-green" id="btnAcierto" onclick="marcar('acierto')">✅ Acierto</button>
        <button class="btn btn-red"   id="btnError"   onclick="marcar('error')">❌ Error</button>
        <button class="btn btn-yellow" id="btnPasa"   onclick="pasapalabra()">⏩ Pasapalabra</button>
      </div>
    </div>

  </div>

  <!-- CONFIGURACIÓN -->
  <div id="config" class="panel">
    <div class="config-panel">
      <h2>⚙️ Configuración de preguntas</h2>
      <div id="configuracionLetra"></div>
    </div>
  </div>
</div>

<script>
// ── Sonidos (Web Audio API – sin dependencias externas) ──────────────────────
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;
function getAudioCtx() { if (!audioCtx) audioCtx = new AudioCtx(); return audioCtx; }

function playTone(freq, dur, type='sine', vol=0.25, fadeOut=true) {
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = type; osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol, ctx.currentTime);
    if (fadeOut) gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    osc.start(); osc.stop(ctx.currentTime + dur);
  } catch(e){}
}

function soundAcierto() {
  playTone(523, 0.12, 'triangle', 0.3);
  setTimeout(()=>playTone(659, 0.12, 'triangle', 0.3), 110);
  setTimeout(()=>playTone(784, 0.2,  'triangle', 0.3), 220);
}
function soundError() {
  playTone(220, 0.15, 'sawtooth', 0.2);
  setTimeout(()=>playTone(185, 0.25, 'sawtooth', 0.2), 120);
}
function soundPasa() {
  playTone(440, 0.08, 'square', 0.15);
  setTimeout(()=>playTone(392, 0.08, 'square', 0.15), 90);
}
function soundCountdown() {
  playTone(660, 0.15, 'triangle', 0.25);
}
function soundGo() {
  playTone(784, 0.1, 'triangle', 0.3);
  setTimeout(()=>playTone(988, 0.1, 'triangle', 0.3), 100);
  setTimeout(()=>playTone(1175,0.2, 'triangle', 0.3), 200);
}

// ── Confeti ──────────────────────────────────────────────────────────────────
const canvas = document.getElementById('confeti');
const ctx = canvas.getContext('2d');
let particles = [];

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

function burst(x, y, count=100) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 9 + 2;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 5,
      alpha: 1,
      color: `hsl(${Math.random()*360},100%,55%)`,
      size: Math.random() * 7 + 3,
      rot: Math.random() * 360,
      rotV: (Math.random() - 0.5) * 10,
      shape: Math.random() > 0.5 ? 'rect' : 'circle'
    });
  }
}

function drawConfeti() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  for (let p of particles) {
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rot * Math.PI / 180);
    ctx.globalAlpha = p.alpha;
    ctx.fillStyle = p.color;
    if (p.shape === 'rect') ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size * 0.5);
    else { ctx.beginPath(); ctx.arc(0, 0, p.size/2, 0, Math.PI*2); ctx.fill(); }
    ctx.restore();
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.25; p.vx *= 0.99;
    p.alpha -= 0.013;
    p.rot += p.rotV;
  }
  particles = particles.filter(p => p.alpha > 0);
  requestAnimationFrame(drawConfeti);
}
drawConfeti();

// ── Voz ──────────────────────────────────────────────────────────────────────
function hablar(texto) {
  speechSynthesis.cancel();
  const msg = new SpeechSynthesisUtterance(texto);
  msg.lang = 'es-ES'; msg.pitch = 1.2; msg.rate = 1.1; msg.volume = 1;
  speechSynthesis.speak(msg);
}

// ── Estado del juego ──────────────────────────────────────────────────────────
let indice = 0;
let tiempoRestante = 0;
let intervalo = null;
let bloqueado = false;
let letrasCompletadas = new Set(); // aciertos + errores
let letrasEnCola = [];             // pendientes de responder
let vueltas = 0;                   // cuántas veces ha dado la vuelta el rosco
let resultados = { aciertos: 0, errores: 0, pasapalabras: 0 };
let juegoActivo = false;

// ── Rosco ─────────────────────────────────────────────────────────────────────
function crearRosco() {
  const rosco = document.getElementById('rosco');
  rosco.innerHTML = '';
  const tam = rosco.offsetWidth || 520;
  const centro = tam / 2;
  const radio = tam / 2 - tam * 0.09;

  LETRAS.forEach((l, i) => {
    const angulo = (i / LETRAS.length) * 2 * Math.PI - Math.PI / 2;
    const x = centro + radio * Math.cos(angulo) - (tam * 0.04);
    const y = centro + radio * Math.sin(angulo) - (tam * 0.04);
    const div = document.createElement('div');
    div.className = 'letra';
    div.id = 'l' + i;
    div.innerText = l;
    div.style.left = x + 'px';
    div.style.top  = y + 'px';
    rosco.appendChild(div);
  });
}

// ── Init ─────────────────────────────────────────────────────────────────────
function init() { crearRosco(); crearConfig(); }

// ── Tabs ─────────────────────────────────────────────────────────────────────
function abrirTab(id, btn) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  btn.classList.add('active');
  if (id === 'config') crearConfig();
}

// ── Countdown overlay ─────────────────────────────────────────────────────────
function mostrarCountdown(callback) {
  const overlay = document.getElementById('countdownOverlay');
  const numEl   = document.getElementById('countdownNum');
  const lbl     = document.getElementById('countdownLabel');
  overlay.classList.add('visible');
  let cnt = 3;

  function step() {
    if (cnt > 0) {
      numEl.textContent = cnt;
      lbl.textContent = cnt === 3 ? 'PREPARADOS' : cnt === 2 ? 'LISTOS' : '¡YA!';
      // Re-trigger animation
      numEl.style.animation = 'none';
      numEl.offsetHeight; // reflow
      numEl.style.animation = 'countPop 1s ease-in-out';
      soundCountdown();
      cnt--;
      setTimeout(step, 1000);
    } else {
      soundGo();
      overlay.classList.remove('visible');
      callback();
    }
  }
  step();
}

// ── Iniciar juego ─────────────────────────────────────────────────────────────
function iniciar() {
  // Resume AudioContext on first interaction
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();

  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('gameScreen').style.display = 'block';

  mostrarCountdown(comenzar);
}

function comenzar() {
  // Reset state
  indice = 0;
  bloqueado = false;
  letrasCompletadas = new Set();
  letrasEnCola = [];
  vueltas = 0;
  resultados = { aciertos: 0, errores: 0, pasapalabras: 0 };
  juegoActivo = true;

  // Reset rosco visual
  document.querySelectorAll('.letra').forEach(l => {
    l.className = 'letra';
  });

  actualizarScoreboard();

  tiempoRestante = parseInt(document.getElementById('tiempo').value) || 180;
  actualizarTimer();

  clearInterval(intervalo);
  intervalo = setInterval(() => {
    tiempoRestante--;
    actualizarTimer();
    if (tiempoRestante <= 0) { clearInterval(intervalo); finJuego(); }
  }, 1000);

  mostrarPregunta();
}

function actualizarTimer() {
  const el = document.getElementById('timer');
  el.textContent = tiempoRestante;
  el.classList.toggle('urgent', tiempoRestante <= 15);
}

function actualizarScoreboard() {
  document.getElementById('scoreAciertos').textContent = resultados.aciertos;
  document.getElementById('scoreErrores').textContent  = resultados.errores;
  document.getElementById('scorePasas').textContent    = resultados.pasapalabras;
}

// ── Lógica del rosco ──────────────────────────────────────────────────────────
function obtenerPregunta(letra) {
  return preguntas.find(p => p.letra === letra);
}

function siguienteIndice() {
  // Busca la siguiente letra no completada
  let intentos = 0;
  do {
    indice = (indice + 1) % LETRAS.length;
    if (indice === 0) vueltas++;
    intentos++;
    if (intentos > LETRAS.length) {
      // Todas completadas
      finJuego();
      return false;
    }
  } while (letrasCompletadas.has(LETRAS[indice]));
  return true;
}

function mostrarPregunta() {
  // Actualizar cola de pasapalabras
  actualizarColaPasa();

  // Resaltar letra activa
  document.querySelectorAll('.letra').forEach(l => l.classList.remove('activa'));
  document.getElementById('l' + indice).classList.add('activa');

  const letra = LETRAS[indice];
  const q = obtenerPregunta(letra);

  let texto;
  if (!q) {
    texto = `No hay pregunta configurada para la letra <b>${letra}</b>.`;
    document.getElementById('pregunta').innerHTML = texto;
    hablar('Letra ' + letra + '. Sin pregunta.');
  } else {
    const tipoTexto = q.tipo === 'empieza' ? 'Empieza por' : 'Contiene la letra';
    document.getElementById('pregunta').innerHTML =
      `<span class="tipo-badge">${tipoTexto} ${letra}</span>${q.pista}`;
    hablar(`Letra ${letra}. ${tipoTexto} ${letra}. ${q.pista}`);
  }

  document.getElementById('respuestaPantalla').textContent = '';
  setBotonesActivos(true);
  bloqueado = false;
}

function setBotonesActivos(activo) {
  ['btnAcierto','btnError','btnPasa'].forEach(id => {
    document.getElementById(id).classList.toggle('btn-disabled', !activo);
  });
}

function actualizarColaPasa() {
  const el = document.getElementById('passQueueInfo');
  const pendientes = LETRAS.filter(l => letrasEnCola.includes(l));
  if (pendientes.length > 0) {
    el.textContent = `⏩ Letras pendientes de responder: ${pendientes.join(' · ')}`;
    el.classList.add('visible');
  } else {
    el.classList.remove('visible');
  }
}

// ── Acciones ──────────────────────────────────────────────────────────────────
function marcar(tipo) {
  if (bloqueado || !juegoActivo) return;
  bloqueado = true;
  setBotonesActivos(false);

  const letra = LETRAS[indice];
  const q = obtenerPregunta(letra);

  // Mostrar respuesta
  document.getElementById('respuestaPantalla').textContent =
    '💡 Respuesta: ' + (q ? q.respuesta : 'N/A');

  const elLetra = document.getElementById('l' + indice);

  if (tipo === 'acierto') {
    elLetra.classList.remove('activa', 'pasada');
    elLetra.classList.add('acierto');
    soundAcierto();
    burst(window.innerWidth / 2, window.innerHeight * 0.35);
    resultados.aciertos++;
    letrasCompletadas.add(letra);
    // Quitar de la cola si estaba
    letrasEnCola = letrasEnCola.filter(l => l !== letra);
  } else {
    elLetra.classList.remove('activa', 'pasada');
    elLetra.classList.add('error');
    soundError();
    resultados.errores++;
    letrasCompletadas.add(letra);
    letrasEnCola = letrasEnCola.filter(l => l !== letra);
  }

  actualizarScoreboard();

  // Comprobar si quedan letras
  const faltantes = LETRAS.filter(l => !letrasCompletadas.has(l));
  if (faltantes.length === 0) {
    setTimeout(finJuego, 1200);
    return;
  }

  setTimeout(() => {
    if (siguienteIndice()) mostrarPregunta();
  }, 1400);
}

function pasapalabra() {
  if (bloqueado || !juegoActivo) return;
  bloqueado = true;
  setBotonesActivos(false);

  const letra = LETRAS[indice];
  soundPasa();
  resultados.pasapalabras++;
  actualizarScoreboard();

  // Marcar la letra como "pasada" visualmente
  const elLetra = document.getElementById('l' + indice);
  elLetra.classList.remove('activa');
  elLetra.classList.add('pasada');

  // Añadir a cola solo si no está ya
  if (!letrasEnCola.includes(letra)) letrasEnCola.push(letra);

  document.getElementById('respuestaPantalla').textContent = '';

  const faltantes = LETRAS.filter(l => !letrasCompletadas.has(l));
  if (faltantes.length === 0) { setTimeout(finJuego, 800); return; }

  setTimeout(() => {
    if (siguienteIndice()) mostrarPregunta();
  }, 600);
}

// ── Fin de juego ──────────────────────────────────────────────────────────────
function finJuego() {
  clearInterval(intervalo);
  juegoActivo = false;
  bloqueado = true;
  setBotonesActivos(false);
  speechSynthesis.cancel();

  // Confeti final
  for (let i = 0; i < 5; i++) {
    setTimeout(() => {
      burst(Math.random() * window.innerWidth, Math.random() * window.innerHeight * 0.5, 60);
    }, i * 300);
  }

  document.getElementById('finAciertos').textContent    = resultados.aciertos;
  document.getElementById('finErrores').textContent     = resultados.errores;
  document.getElementById('finPasapalabras').textContent = resultados.pasapalabras;

  const total = resultados.aciertos + resultados.errores;
  let msg;
  if (resultados.aciertos === LETRAS.length) msg = "🏆 ¡ROSCO COMPLETO! ¡Increíble, David!";
  else if (resultados.aciertos >= 20) msg = "🔥 ¡Brutal! ¡Casi lo borras entero!";
  else if (resultados.aciertos >= 14) msg = "👏 ¡Muy bien jugado, campeón!";
  else if (resultados.aciertos >= 8)  msg = "😅 No está mal… ¡pero puedes mejorar!";
  else msg = "🤣 Tranquilo, habrá revancha…";
  document.getElementById('finMensaje').textContent = msg;

  document.getElementById('modalFin').classList.add('visible');
  hablar(msg.replace(/[🏆🔥👏😅🤣]/g, ''));
}

function resetGame() {
  document.getElementById('modalFin').classList.remove('visible');
  document.getElementById('startScreen').style.display = 'block';
  document.getElementById('gameScreen').style.display  = 'none';
  document.getElementById('respuestaPantalla').textContent = '';
  document.getElementById('pregunta').innerHTML = 'Pulsa <b>¡Empezar!</b> para comenzar el rosco.';
  document.getElementById('timer').textContent = '';
  document.getElementById('passQueueInfo').classList.remove('visible');
  document.querySelectorAll('.letra').forEach(l => l.className = 'letra');
  clearInterval(intervalo);
  juegoActivo = false;
  actualizarScoreboard();
}

// ── Configuración ─────────────────────────────────────────────────────────────
function crearConfig() {
  const div = document.getElementById('configuracionLetra');
  div.innerHTML = '';
  LETRAS.forEach(l => {
    const q = obtenerPregunta(l) || { letra: l, tipo: 'empieza', pista: '', respuesta: '' };
    const row = document.createElement('div');
    row.className = 'config-row';
    row.innerHTML = `
      <div class="config-letter">${l}</div>
      <div class="config-fields">
        <select id="tipo${l}">
          <option value="empieza">Empieza por</option>
          <option value="contiene">Contiene</option>
        </select>
        <input type="text" id="pista${l}" placeholder="Pista..." value="${q.pista}" style="flex:1;min-width:180px;">
        <input type="text" id="resp${l}"  placeholder="Respuesta..." value="${q.respuesta}" class="resp">
        <button class="btn-sm btn-save" onclick="guardar('${l}')">💾 Guardar</button>
        <button class="btn-sm btn-del"  onclick="eliminar('${l}')">🗑 Borrar</button>
      </div>`;
    div.appendChild(row);
    document.getElementById('tipo' + l).value = q.tipo;
  });
}

function guardar(letra) {
  const tipo     = document.getElementById('tipo' + letra).value;
  const pista    = document.getElementById('pista' + letra).value;
  const respuesta = document.getElementById('resp' + letra).value;
  const q = obtenerPregunta(letra);
  if (q) { q.tipo = tipo; q.pista = pista; q.respuesta = respuesta; }
  else { preguntas.push({ letra, tipo, respuesta, pista }); }
  // Visual feedback
  const btn = event.currentTarget;
  btn.textContent = '✅ Guardado';
  setTimeout(() => btn.textContent = '💾 Guardar', 1500);
}

function eliminar(letra) {
  preguntas = preguntas.filter(p => p.letra !== letra);
  crearConfig();
}

// ── Start ─────────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  if (!juegoActivo) crearRosco();
  resizeCanvas();
});

init();
</script>
