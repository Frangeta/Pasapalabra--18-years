<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Pasapalabra Fiesta David 18 - Show TV</title>
<style>
body{font-family:Arial,sans-serif;margin:0;background:linear-gradient(135deg,#ff0080,#ff8c00);color:white;text-align:center;overflow-x:hidden;}
h1{margin-top:10px;}
.container{max-width:1100px;margin:auto;padding:20px;}
#tabs{margin-top:20px;}
.tab{display:inline-block;padding:10px 20px;background:rgba(0,0,0,0.3);cursor:pointer;margin-right:5px;border-radius:8px;}
.tab.active{background:yellow;color:black;font-weight:bold;}
.tabcontent{display:none;margin-top:20px;}
#rosco{position:relative;width:520px;height:520px;margin:30px auto;}
.letra{position:absolute;width:42px;height:42px;border-radius:50%;background:white;color:black;font-weight:bold;display:flex;align-items:center;justify-content:center;transition:0.3s;box-shadow:0 3px 8px rgba(0,0,0,0.4);}
.activa{background:#ffe600;transform:scale(1.3);animation:parpadeo 1s infinite;}
.acierto{background:#2ecc71;color:white;transform:scale(1.2);}
.error{background:#e74c3c;color:white;transform:scale(1.2);}
@keyframes parpadeo{0%,100%{opacity:1;}50%{opacity:0.5;}}
#pregunta{font-size:22px;background:rgba(0,0,0,0.4);padding:20px;border-radius:10px;min-height:80px;margin-bottom:10px;transition:all 0.3s;}
#respuestaPantalla{font-size:22px;background:rgba(0,0,0,0.5);padding:10px;border-radius:10px;margin:10px;color:#fff;transition:all 0.3s;}
button{padding:12px 20px;margin:5px;border:none;border-radius:8px;font-size:16px;cursor:pointer;}
.ok{background:#2ecc71;color:white;}
.fail{background:#e74c3c;color:white;}
.pass{background:#f1c40f;color:black;}
.start{background:#3498db;color:white;}
input,select,textarea{padding:6px;margin:4px;}
.config{background:rgba(0,0,0,0.25);padding:15px;border-radius:10px;margin-top:20px;text-align:left;}
.config div{margin-bottom:8px;}
#timer{font-size:30px;margin:10px;font-weight:bold;}
canvas#confeti{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;}
</style>
</head>
<body>
<div class="container">
<h1>🎉 Fiesta cumpleaños David 18 🎉</h1>

<div id="tabs">
<div class="tab active" onclick="abrirTab('juego')">Juego</div>
<div class="tab" onclick="abrirTab('config')">Configuración</div>
</div>

<div id="juego" class="tabcontent" style="display:block">
<div>
Tiempo de juego (segundos):
<input id="tiempo" type="number" value="180">
<button class="start" onclick="iniciar()">Empezar</button>
</div>
<div id="cuenta"></div>
<div id="timer"></div>
<div id="rosco"></div>
<div id="pregunta"></div>
<div id="respuestaPantalla"></div>
<div>
<button class="ok" onclick="marcar('acierto')">Acierto</button>
<button class="fail" onclick="marcar('error')">Error</button>
<button class="pass" onclick="pasapalabra()">Pasapalabra</button>
</div>
<div id="continuar" style="display:none;margin-top:10px;">
<button onclick="continuarJuego()">Continuar</button>
</div>
</div>

<div id="config" class="tabcontent">
<h2>Configuración de preguntas</h2>
<div id="configuracionLetra"></div>
</div>

<canvas id="confeti"></canvas>

<audio id="sonidoAcierto" src="https://www.soundjay.com/button/sounds/button-3.mp3"></audio>
<audio id="sonidoError" src="https://www.soundjay.com/button/sounds/button-10.mp3"></audio>
<audio id="sonidoPasapalabra" src="https://www.soundjay.com/button/sounds/button-16.mp3"></audio>

</div>

<script>
// --- Variables ---
const letras="ABCDEFGHIJKLMNÑOPQRSTUVWXYZ".split("");
let preguntas=[],indice=0,tiempo=0,intervalo,espera=false;
let resultados={aciertos:0,errores:0,pasapalabras:0};

// --- Confeti ---
const canvas=document.getElementById("confeti");
canvas.width=window.innerWidth;canvas.height=window.innerHeight;
const ctx=canvas.getContext("2d");
let confetiParticulas=[];
function crearConfeti(x,y){
for(let i=0;i<80;i++){
confetiParticulas.push({
x:x+Math.random()*100-50,
y:y+Math.random()*50-25,
dx:(Math.random()-0.5)*6,dy:Math.random()*-8-2,
alpha:1,radio:Math.random()*6+3,
color:`hsl(${Math.random()*360},100%,50%)`,tilt:Math.random()*20-10
});}}
function animarConfeti(){
ctx.clearRect(0,0,canvas.width,canvas.height);
for(let p of confetiParticulas){
ctx.save();
ctx.translate(p.x,p.y);
ctx.rotate(p.tilt*Math.PI/180);
ctx.fillStyle=p.color;ctx.globalAlpha=p.alpha;
ctx.fillRect(-p.radio/2,-p.radio/2,p.radio,p.radio);
ctx.restore();
p.x+=p.dx;p.y+=p.dy;p.alpha-=0.02;p.tilt+=0.5;
}confetiParticulas=confetiParticulas.filter(p=>p.alpha>0);requestAnimationFrame(animarConfeti);}
animarConfeti();

// --- Preguntas preconfiguradas ---
function cargarPreguntas(){preguntas=[
{letra:"A",tipo:"empieza",respuesta:"Ahorrar",pista:"Lo que prometes hacer con el dinero… pero nunca haces."},
{letra:"B",tipo:"contiene",respuesta:"Bizum",pista:"Aplicación que te salva cuando te quedas sin efectivo."},
{letra:"C",tipo:"empieza",respuesta:"Coche",pista:"Medio de transporte que quieres tener a los 18."},
{letra:"D",tipo:"empieza",respuesta:"DNI",pista:"Documento nacional de identidad."},
{letra:"E",tipo:"contiene",respuesta:"Educación",pista:"Lo que dicen tus padres que debes tener ahora."},
{letra:"F",tipo:"empieza",respuesta:"Fiesta",pista:"Lo que haces los fines de semana."},
{letra:"G",tipo:"empieza",respuesta:"Grupo",pista:"Personas con las que sales los fines de semana."},
{letra:"H",tipo:"empieza",respuesta:"Horario",pista:"Lo que necesitas para organizar tu día."},
{letra:"I",tipo:"empieza",respuesta:"Independencia",pista:"Lo que quieres tener cuando cumples 18."},
{letra:"J",tipo:"empieza",respuesta:"Juerga",pista:"Lo que algunos montan después de tres copas."},
{letra:"K",tipo:"empieza",respuesta:"K",pista:"Letra que usas cuando escribes 'k pasa'."},
{letra:"L",tipo:"empieza",respuesta:"Luz",pista:"Lo que sube cuando enciendes muchas cosas en casa."},
{letra:"M",tipo:"empieza",respuesta:"Mareo",pista:"Lo que te queda después de una gran fiesta."},
{letra:"N",tipo:"empieza",respuesta:"Niño",pista:"Lo que dicen tus padres que sigues siendo."},
{letra:"Ñ",tipo:"empieza",respuesta:"Enseñar",pista:"Contiene la Ñ: acción de transmitir conocimientos."},
{letra:"O",tipo:"empieza",respuesta:"Ocio",pista:"Tiempo libre fuera de trabajo o estudios."},
{letra:"P",tipo:"empieza",respuesta:"Pintas",pista:"Lo que prometes que será 'solo uno'."},
{letra:"Q",tipo:"empieza",respuesta:"Quejarte",pista:"Lo que haces cuando algo no te gusta."},
{letra:"R",tipo:"empieza",respuesta:"Responsabilidad",pista:"Capacidad de asumir obligaciones."},
{letra:"S",tipo:"empieza",respuesta:"Ser responsable",pista:"Lo que prometes hacer mañana."},
{letra:"T",tipo:"empieza",respuesta:"Trabajo",pista:"Actividad remunerada que realizas."},
{letra:"U",tipo:"empieza",respuesta:"Universidad",pista:"Lugar donde muchos dicen que van a estudiar… y también a salir."},
{letra:"V",tipo:"empieza",respuesta:"Votar",pista:"Derecho político al cumplir 18 años."},
{letra:"W",tipo:"empieza",respuesta:"Wifi",pista:"Lo que preguntas cuando no hay datos."},
{letra:"X",tipo:"contiene",respuesta:"Excusa",pista:"Contiene la X: explicación cuando te equivocas."},
{letra:"Y",tipo:"empieza",respuesta:"Y",pista:"Conjunción que une palabras."},
{letra:"Z",tipo:"empieza",respuesta:"Zombie",pista:"En lo que te conviertes después de la fiesta."}
];}

// --- Inicialización ---
function init(){cargarPreguntas();crearRosco();crearConfig();}

// --- Pestañas ---
function abrirTab(id){document.querySelectorAll(".tabcontent").forEach(t=>t.style.display="none");document.querySelectorAll(".tab").forEach(tb=>tb.classList.remove("active"));document.getElementById(id).style.display="block";event.currentTarget.classList.add("active");}

// --- Rosco ---
function crearRosco(){
const rosco=document.getElementById("rosco");rosco.innerHTML="";
const radio=230,centro=260;
letras.forEach((l,i)=>{
const angulo=(i/letras.length)*2*Math.PI;
const x=centro+radio*Math.cos(angulo)-20;
const y=centro+radio*Math.sin(angulo)-20;
const div=document.createElement("div");
div.className="letra";div.id="l"+i;div.innerText=l;
div.style.left=x+"px";div.style.top=y+"px";
rosco.appendChild(div);
});
}

// --- Voz presentador TV ---
function hablar(texto){
const msg=new SpeechSynthesisUtterance(texto);
msg.lang="es-ES"; msg.pitch=1.4; msg.rate=1.5; // voz más contundente
speechSynthesis.speak(msg);
}

// --- Juego ---
function iniciar(){
indice=0;espera=false;resultados={aciertos:0,errores:0,pasapalabras:0};
let cuenta=5;document.getElementById("cuenta").innerText="Empieza en "+cuenta;
const countdown=setInterval(()=>{
cuenta--;document.getElementById("cuenta").innerText="Empieza en "+cuenta;
if(cuenta==0){clearInterval(countdown);document.getElementById("cuenta").innerText="";comenzar();}
},1000);
}
function comenzar(){
tiempo=parseInt(document.getElementById("tiempo").value);
document.getElementById("timer").innerText=tiempo;
intervalo=setInterval(()=>{tiempo--;document.getElementById("timer").innerText=tiempo;if(tiempo<=0){clearInterval(intervalo);finJuego();}},1000);
mostrarPregunta();
}
function obtenerPregunta(letra){return preguntas.find(p=>p.letra==letra);}
function mostrarPregunta(){
document.querySelectorAll(".letra").forEach(l=>l.classList.remove("activa"));
document.getElementById("l"+indice).classList.add("activa");
const letra=letras[indice];
const q=obtenerPregunta(letra);
if(!q){document.getElementById("pregunta").innerText="No hay pregunta para "+letra;hablar("Letra "+letra);return;}
const texto=(q.tipo=="empieza"?"Empieza por ":"Contiene la letra ")+letra+". "+q.pista;
document.getElementById("pregunta").innerText=texto;
hablar("Letra "+letra+". "+texto);
document.getElementById("respuestaPantalla").innerText="";
}
function siguiente(){indice++;if(indice>=letras.length) indice=0;mostrarPregunta();}
function marcar(tipo){
if(espera)return;
const letra=letras[indice];const q=obtenerPregunta(letra);
document.getElementById("respuestaPantalla").innerText="Respuesta: "+(q?q.respuesta:"N/A");
if(tipo=="acierto"){document.getElementById("l"+indice).classList.add("acierto");document.getElementById("sonidoAcierto").play();crearConfeti(window.innerWidth/2,200);resultados.aciertos++;}
else if(tipo=="error"){document.getElementById("l"+indice).classList.add("error");document.getElementById("sonidoError").play();crearConfeti(window.innerWidth/2,200);resultados.errores++;}
setTimeout(siguiente,1200);
}
function pasapalabra(){document.getElementById("sonidoPasapalabra").play();resultados.pasapalabras++;document.getElementById("continuar").style.display="block";espera=true;}
function continuarJuego(){espera=false;document.getElementById("continuar").style.display="none";siguiente();}
function finJuego(){clearInterval(intervalo);alert(`Juego terminado!\nAciertos: ${resultados.aciertos}\nErrores: ${resultados.errores}\nPasapalabras: ${resultados.pasapalabras}`);}

// --- Configuración ---
function crearConfig(){
const div=document.getElementById("configuracionLetra");div.innerHTML="";
letras.forEach((l,i)=>{
const q=obtenerPregunta(l) || {letra:l,tipo:"empieza",pista:"",respuesta:""};
const fila=document.createElement("div");
fila.innerHTML=`<b>${l}</b> Tipo:
<select id="tipo${l}"><option value="empieza">Empieza por</option><option value="contiene">Contiene</option></select>
Pista:<input id="pista${l}" value="${q.pista}" style="width:250px">
Respuesta:<input id="resp${l}" value="${q.respuesta}">
<button onclick="guardar('${l}')">Guardar</button>
<button onclick="eliminar('${l}')">Eliminar</button>`;
div.appendChild(fila);
document.getElementById("tipo"+l).value=q.tipo;
});
}
function guardar(letra){
const q=obtenerPregunta(letra);
const tipo=document.getElementById("tipo"+letra).value;
const pista=document.getElementById("pista"+letra).value;
const respuesta=document.getElementById("resp"+letra).value;
if(q){q.tipo=tipo;q.pista=pista;q.respuesta=respuesta;}
else{preguntas.push({letra,tipo,respuesta,pista});}
crearRosco();crearConfig();
}
function eliminar(letra){preguntas=preguntas.filter(p=>p.letra!==letra);crearRosco();crearConfig();}

// --- Inicializar ---
init();
</script>
</body>
</html>
