<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Pasapalabra - David 18</title>
<style>
body{font-family:Arial,sans-serif;margin:0;background:linear-gradient(135deg,#ff0080,#ff8c00);color:white;text-align:center;}
h1{margin-top:10px;}
.container{max-width:1100px;margin:auto;padding:20px;}
#tabs{margin-top:20px;}
.tab{display:inline-block;padding:10px 20px;background:rgba(0,0,0,0.3);cursor:pointer;margin-right:5px;border-radius:8px;}
.tab.active{background:yellow;color:black;font-weight:bold;}
.tabcontent{display:none;margin-top:20px;}
#rosco{position:relative;width:520px;height:520px;margin:30px auto;}
.letra{position:absolute;width:42px;height:42px;border-radius:50%;background:white;color:black;font-weight:bold;display:flex;align-items:center;justify-content:center;transition:0.3s;box-shadow:0 3px 8px rgba(0,0,0,0.4);}
.activa{background:#ffe600;transform:scale(1.2);}
.acierto{background:#2ecc71;color:white;}
.error{background:#e74c3c;color:white;}
#pregunta{font-size:22px;background:rgba(0,0,0,0.3);padding:20px;border-radius:10px;min-height:80px;}
button{padding:12px 20px;margin:5px;border:none;border-radius:8px;font-size:16px;cursor:pointer;}
.ok{background:#2ecc71;color:white;}
.fail{background:#e74c3c;color:white;}
.pass{background:#f1c40f;color:black;}
.start{background:#3498db;color:white;}
input,select{padding:6px;margin:4px;}
.config{background:rgba(0,0,0,0.25);padding:15px;border-radius:10px;margin-top:20px;}
#timer{font-size:30px;margin:10px;font-weight:bold;}
</style>
</head>
<body>
<div class="container">
<h1>🎉 Fiesta cumpleaños David 18 años 🎉</h1>

<div id="tabs">
<div class="tab active" onclick="abrirTab('juego')">Juego</div>
<div class="tab" onclick="abrirTab('config')">Configuración</div>
</div>

<div id="juego" class="tabcontent" style="display:block">
<div>
Tiempo de juego (segundos)
<input id="tiempo" type="number" value="180">
<button class="start" onclick="iniciar()">Empezar</button>
</div>
<div id="cuenta"></div>
<div id="timer"></div>
<div id="rosco"></div>
<div id="pregunta"></div>
<div>
<button class="ok" onclick="acierto()">Acierto</button>
<button class="fail" onclick="error()">Error</button>
<button class="pass" onclick="pasapalabra()">Pasapalabra</button>
</div>
</div>

<div id="config" class="tabcontent">
<h2>Preguntas preconfiguradas / Editar</h2>
Letra<select id="letra"></select>
Tipo<select id="tipo">
<option value="empieza">Empieza por</option>
<option value="contiene">Contiene</option>
</select>
Respuesta<input id="respuesta">
Pista<input id="pista" style="width:300px">
<button onclick="agregar()">Añadir</button>
<div id="lista"></div>
</div>

</div>

<script>
const letras="ABCDEFGHIJKLMNÑOPQRSTUVWXYZ".split("")
let preguntas=[],indice=0,tiempo=0,intervalo

function init(){
const sel=document.getElementById("letra")
letras.forEach(l=>{let o=document.createElement("option");o.text=l;sel.add(o)})
// Preconfigurado
preguntas=[
{letra:"A",tipo:"empieza",respuesta:"Ahorrar",pista:"Lo que prometes hacer con el dinero… pero nunca haces."},
{letra:"B",tipo:"contiene",respuesta:"Bizum",pista:"Aplicación que te salva cuando te quedas sin efectivo."},
{letra:"C",tipo:"empieza",respuesta:"Coche",pista:"Medio de transporte que quieres tener a los 18."},
{letra:"D",tipo:"empieza",respuesta:"DNI",pista:"Documento nacional de identidad."},
{letra:"E",tipo:"contiene",respuesta:"Educación",pista:"Lo que dicen tus padres que debes tener ahora."},
{letra:"F",tipo:"empieza",respuesta:"Fiesta",pista:"Lo que haces los fines de semana."},
{letra:"G",tipo:"empieza",respuesta:"Grupo",pista:"Personas con las que sales los fines de semana."},
{letra:"H",tipo:"empieza",respuesta:"Horario",pista:"Lo que necesitas para organizar tu día."},
{letra:"I",tipo:"empieza",respuesta:"Independencia",pista:"Lo que quieres tener cuando cumples 18."},
{letra:"J",tipo:"empieza",respuesta:"Juerga",pista:"Lo que algunos montan después de tres copas."},
{letra:"K",tipo:"empieza",respuesta:"K",pista:"Letra que usas cuando escribes 'k pasa'."},
{letra:"L",tipo:"empieza",respuesta:"Luz",pista:"Lo que sube cuando enciendes muchas cosas en casa."},
{letra:"M",tipo:"empieza",respuesta:"Mareo",pista:"Lo que te queda después de una gran fiesta."},
{letra:"N",tipo:"empieza",respuesta:"Niño",pista:"Lo que dicen tus padres que sigues siendo."},
{letra:"Ñ",tipo:"empieza",respuesta:"Enseñar",pista:"Contiene la Ñ: acción de transmitir conocimientos."},
{letra:"O",tipo:"empieza",respuesta:"Ocio",pista:"Tiempo libre fuera de trabajo o estudios."},
{letra:"P",tipo:"empieza",respuesta:"Pintas",pista:"Lo que prometes que será 'solo una más y nos vamos'."},
{letra:"Q",tipo:"empieza",respuesta:"Quejarte",pista:"Lo que haces cuando algo no te gusta."},
{letra:"R",tipo:"empieza",respuesta:"Responsabilidad",pista:"Capacidad de asumir obligaciones."},
{letra:"S",tipo:"empieza",respuesta:"Ser responsable",pista:"Lo que prometes hacer mañana."},
{letra:"T",tipo:"empieza",respuesta:"Trabajo",pista:"Actividad remunerada que realizas."},
{letra:"U",tipo:"empieza",respuesta:"Universidad",pista:"Lugar donde muchos dicen que van a estudiar.. pero van a jugar al mus y también a salir."},
{letra:"V",tipo:"empieza",respuesta:"Votar",pista:"Derecho político al cumplir 18 años."},
{letra:"W",tipo:"empieza",respuesta:"Wifi",pista:"Lo que preguntas cuando no hay datos."},
{letra:"X",tipo:"contiene",respuesta:"Excusa",pista:"Contiene la X: explicación cuando te equivocas."},
{letra:"Y",tipo:"empieza",respuesta:"Y",pista:"Conjunción que une palabras."},
{letra:"Z",tipo:"empieza",respuesta:"Zombie",pista:"En lo que te conviertes después de la fiesta."}
]
renderLista()
crearRosco()
}
function abrirTab(id){
document.querySelectorAll(".tabcontent").forEach(t=>t.style.display="none")
document.querySelectorAll(".tab").forEach(tb=>tb.classList.remove("active"))
document.getElementById(id).style.display="block"
event.currentTarget.classList.add("active")
}
function crearRosco(){
const rosco=document.getElementById("rosco")
rosco.innerHTML=""
const radio=230,centro=260
letras.forEach((l,i)=>{
const angulo=(i/letras.length)*2*Math.PI
const x=centro+radio*Math.cos(angulo)-20
const y=centro+radio*Math.sin(angulo)-20
const div=document.createElement("div")
div.className="letra";div.id="l"+i;div.innerText=l
div.style.left=x+"px";div.style.top=y+"px"
rosco.appendChild(div)
})
}
function hablar(texto){
const msg=new SpeechSynthesisUtterance(texto)
msg.lang="es-ES"
speechSynthesis.speak(msg)
}
function iniciar(){
indice=0
let cuenta=10
document.getElementById("cuenta").innerText="Empieza en "+cuenta
const countdown=setInterval(()=>{
cuenta--
document.getElementById("cuenta").innerText="Empieza en "+cuenta
if(cuenta==0){clearInterval(countdown);document.getElementById("cuenta").innerText="";comenzar()}
},1000)
}
function comenzar(){
tiempo=parseInt(document.getElementById("tiempo").value)
document.getElementById("timer").innerText=tiempo
intervalo=setInterval(()=>{
tiempo--;document.getElementById("timer").innerText=tiempo
if(tiempo<=0){clearInterval(intervalo);alert("Tiempo terminado")}
},1000)
mostrarPregunta()
}
function obtenerPregunta(letra){return preguntas.find(p=>p.letra==letra)}
function mostrarPregunta(){
document.querySelectorAll(".letra").forEach(l=>l.classList.remove("activa"))
document.getElementById("l"+indice).classList.add("activa")
const letra=letras[indice]
const q=obtenerPregunta(letra)
if(!q){document.getElementById("pregunta").innerText="No hay pregunta para "+letra;hablar("Letra "+letra);return}
const texto=(q.tipo=="empieza"?"Empieza por ":"Contiene la letra ")+letra+". "+q.pista
document.getElementById("pregunta").innerText=texto
hablar("Letra "+letra+". "+texto)
}
function siguiente(){indice++;if(indice>=letras.length) indice=0;mostrarPregunta()}
function acierto(){document.getElementById("l"+indice).classList.add("acierto");siguiente()}
function error(){document.getElementById("l"+indice).classList.add("error");siguiente()}
function pasapalabra(){siguiente()}
function agregar(){
const letra=document.getElementById("letra").value
const tipo=document.getElementById("tipo").value
const respuesta=document.getElementById("respuesta").value
const pista=document.getElementById("pista").value
preguntas.push({letra,tipo,respuesta,pista})
renderLista()
}
function renderLista(){
const div=document.getElementById("lista");div.innerHTML=""
preguntas.forEach((p,i)=>{
const row=document.createElement("div")
row.innerText=p.letra+" | "+p.tipo+" | "+p.pista+" → "+p.respuesta
div.appendChild(row)
})
}
init()
</script>
</body>
</html>
